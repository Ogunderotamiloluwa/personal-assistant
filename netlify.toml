[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "https://persona-assistant-backend.onrender.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

